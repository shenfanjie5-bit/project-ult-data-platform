name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: dp
          POSTGRES_USER: postgres
          # Allow all local connections without password (CI only).
          # Fixes "password authentication failed" when tests create
          # dynamic per-test databases and reconnect.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:dp@localhost:55432/postgres
      DP_PG_DSN: postgresql://postgres:dp@localhost:55432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard tracked repository artifacts
        run: python scripts/check_repository_artifacts.py

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run DDL migrations
        run: |
          python -c "
          from data_platform.ddl.runner import MigrationRunner
          import os
          runner = MigrationRunner()
          applied = runner.apply_pending(os.environ['DP_PG_DSN'])
          print(f'Applied {len(applied)} migrations: {applied}')
          "

      - name: Run tests
        run: python -m pytest
