name: CI

on:
  push:
  pull_request:

jobs:
  # Existing PG-backed full-suite lane preserved — runs every existing
  # test against a real PostgreSQL service. Now also installs
  # contracts-schemas + shared-fixtures so the new contract cross-repo
  # alignment + regression real-fixture consumption all run.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: dp
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:dp@localhost:55432/postgres
      DP_PG_DSN: postgresql://postgres:dp@localhost:55432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Guard tracked repository artifacts
        run: python scripts/check_repository_artifacts.py

      - name: Install test dependencies (full, incl. cross-repo + shared-fixtures)
        run: python -m pip install -e ".[dev,contracts-schemas,shared-fixtures]"

      - name: Run DDL migrations
        run: |
          python -c "
          from data_platform.ddl.runner import MigrationRunner
          import os
          runner = MigrationRunner()
          applied = runner.apply_pending(os.environ['DP_PG_DSN'])
          print(f'Applied {len(applied)} migrations: {applied}')
          "

      - name: Run tests
        run: python -m pytest

  # Stage-2 plan canonical lanes (project-ult test rollout):
  # - test-fast and smoke install ONLY [dev] so they stay offline-first
  #   per SUBPROJECT_TESTING_STANDARD.md §2.2 (no PG service either).
  # - regression installs [shared-fixtures] for real audit_eval_fixtures
  #   consumption (no module-level skip per iron rule #1).
  # - contract installs [contracts-schemas] for cross-repo alignment.
  test-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: test-fast (unit + boundary)
        run: make test-fast

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: smoke
        run: make smoke

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with cross-repo contracts-schemas extra)
        run: pip install -e ".[dev,contracts-schemas]"
      - name: contract (incl. cross-repo alignment)
        run: make contract

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with shared-fixtures git extra)
        run: pip install -e ".[dev,shared-fixtures]"
      - name: regression (must really consume audit_eval_fixtures)
        run: make regression

  canonical-v2-default-on:
    runs-on: ubuntu-latest
    env:
      DP_CANONICAL_USE_V2: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (offline-first dev only)
        run: pip install -e ".[dev]"
      - name: canonical-v2 default-on lane
        run: |
          python -m pytest -p no:cacheprovider \
            tests/serving \
            tests/cycle/test_current_cycle_inputs.py \
            tests/cycle/test_current_cycle_inputs_lineage_absent.py \
            tests/test_assets.py \
            -q
