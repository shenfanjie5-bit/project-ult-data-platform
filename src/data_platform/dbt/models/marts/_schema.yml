version: 2

models:
  - name: mart_dim_security
    description: Canonical security dimension sourced from the intermediate security master.
    columns:
      - name: ts_code
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('int_security_master')
              field: ts_code
              config:
                severity: error
      - name: list_date
        tests:
          - not_null
      - name: is_active
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: mart_dim_index
    description: Canonical index dimension derived from normalized index membership.
    columns:
      - name: index_code
        tests:
          - not_null
          - unique
      - name: first_effective_date
        tests:
          - not_null
      - name: latest_effective_date
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: mart_fact_price_bar
    description: Canonical price bar fact table at daily, weekly, and monthly frequencies.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "trade_date", "freq"]
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('mart_dim_security')
              field: ts_code
      - name: trade_date
        tests:
          - not_null
      - name: freq
        tests:
          - not_null
          - accepted_values:
              values: ["daily", "weekly", "monthly"]
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: mart_fact_financial_indicator
    description: Canonical latest financial indicator fact table.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "end_date", "report_type"]
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('mart_dim_security')
              field: ts_code
      - name: end_date
        tests:
          - not_null
      - name: ann_date
        tests:
          - not_null
      - name: report_type
        tests:
          - not_null
      - name: is_latest
        tests:
          - not_null
          - accepted_values:
              values: [true]
              quote: false
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: mart_fact_event
    description: Canonical event fact table with metadata-only event payloads.
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            ["event_type", "ts_code", "event_date", "title", "related_date", "reference_url"]
    columns:
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values:
                [
                  "announcement",
                  "suspend",
                  "dividend",
                  "share_float",
                  "holder_number",
                  "disclosure_date",
                  "name_change",
                  "block_trade",
                ]
      - name: event_date
        tests:
          - not_null
      - name: ts_code
        tests:
          - relationships:
              to: ref('mart_dim_security')
              field: ts_code
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: mart_fact_market_daily_feature
    description: Canonical daily security market feature fact table.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "trade_date"]
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('mart_dim_security')
              field: ts_code
      - name: trade_date
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: mart_fact_index_price_bar
    description: Canonical index price bar fact table enriched with trade calendar fields.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["index_code", "trade_date"]
    columns:
      - name: index_code
        tests:
          - not_null
          - relationships:
              to: ref('mart_dim_index')
              field: index_code
      - name: trade_date
        tests:
          - not_null
      - name: is_open
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: mart_fact_forecast_event
    description: Canonical earnings forecast fact table retaining Tushare forecast versions.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "ann_date", "end_date", "update_flag", "forecast_type"]
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('mart_dim_security')
              field: ts_code
      - name: ann_date
        tests:
          - not_null
      - name: end_date
        tests:
          - not_null
      - name: forecast_type
        tests:
          - not_null
      - name: update_flag
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null
