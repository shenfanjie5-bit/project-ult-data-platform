version: 2

models:
  - name: mart_deriv_lineage_top_holder_qoq_change
    description: Lineage summary paired to mart_deriv_top_holder_qoq_change on the current holding row key.
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - mart_key
      - derivation_lineage_key_parity:
          business_model: ref('mart_deriv_top_holder_qoq_change')
          key_columns:
            - mart_key
    columns:
      - name: mart_key
        tests:
          - not_null
      - name: holding_source
        tests:
          - not_null
      - name: holder_id
        tests:
          - not_null
      - name: security_id
        tests:
          - not_null
      - name: report_date
        tests:
          - not_null
      - name: announced_date
        tests:
          - not_null
      - name: dataset
        tests:
          - not_null
      - name: snapshot_id
        tests:
          - not_null
      - name: as_of_date
        tests:
          - not_null
      - name: source_mart
        tests:
          - not_null
          - accepted_values:
              values:
                - 'mart_fact_holding_position_v2'
              quote: true
      - name: source_window_start_date
        tests:
          - not_null
      - name: source_window_end_date
        tests:
          - not_null
      - name: source_interface_ids
        tests:
          - not_null
      - name: source_row_count
        tests:
          - not_null
      - name: source_lineage_row_count
        tests:
          - not_null
      - name: source_lineage_summary
        tests:
          - not_null
      - name: source_run_ids
        tests:
          - not_null
      - name: raw_loaded_at_min
        tests:
          - not_null
      - name: raw_loaded_at_max
        tests:
          - not_null

  - name: mart_deriv_lineage_fund_co_holding
    description: Lineage summary paired to mart_deriv_fund_co_holding on the lexicographic pair key.
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - mart_key
      - derivation_lineage_key_parity:
          business_model: ref('mart_deriv_fund_co_holding')
          key_columns:
            - mart_key
    columns:
      - name: mart_key
        tests:
          - not_null
      - name: report_date
        tests:
          - not_null
      - name: security_id_left
        tests:
          - not_null
      - name: security_id_right
        tests:
          - not_null
      - name: dataset
        tests:
          - not_null
      - name: snapshot_id
        tests:
          - not_null
      - name: as_of_date
        tests:
          - not_null
      - name: source_mart
        tests:
          - not_null
          - accepted_values:
              values:
                - 'mart_fact_holding_position_v2'
              quote: true
      - name: source_window_start_date
        tests:
          - not_null
      - name: source_window_end_date
        tests:
          - not_null
      - name: source_interface_ids
        tests:
          - not_null
      - name: source_row_count
        tests:
          - not_null
      - name: source_lineage_row_count
        tests:
          - not_null
      - name: source_lineage_summary
        tests:
          - not_null
      - name: source_run_ids
        tests:
          - not_null
      - name: raw_loaded_at_min
        tests:
          - not_null
      - name: raw_loaded_at_max
        tests:
          - not_null

  - name: mart_deriv_lineage_northbound_holding_z_score
    description: Lineage summary paired to mart_deriv_northbound_holding_z_score on the metric row key and source rolling window.
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - mart_key
      - derivation_lineage_key_parity:
          business_model: ref('mart_deriv_northbound_holding_z_score')
          key_columns:
            - mart_key
    columns:
      - name: mart_key
        tests:
          - not_null
      - name: security_id
        tests:
          - not_null
      - name: holder_id
        tests:
          - not_null
      - name: report_date
        tests:
          - not_null
      - name: z_score_metric
        tests:
          - not_null
          - accepted_values:
              values:
                - 'holding_amount'
                - 'holding_ratio'
              quote: true
      - name: dataset
        tests:
          - not_null
      - name: snapshot_id
        tests:
          - not_null
      - name: as_of_date
        tests:
          - not_null
      - name: source_mart
        tests:
          - not_null
          - accepted_values:
              values:
                - 'mart_fact_holding_position_v2'
              quote: true
      - name: source_window_start_date
        tests:
          - not_null
      - name: source_window_end_date
        tests:
          - not_null
      - name: source_interface_ids
        tests:
          - not_null
      - name: source_row_count
        tests:
          - not_null
      - name: source_lineage_row_count
        tests:
          - not_null
      - name: source_lineage_summary
        tests:
          - not_null
      - name: source_run_ids
        tests:
          - not_null
      - name: raw_loaded_at_min
        tests:
          - not_null
      - name: raw_loaded_at_max
        tests:
          - not_null
