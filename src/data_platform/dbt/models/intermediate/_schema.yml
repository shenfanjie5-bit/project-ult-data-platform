version: 2

models:
  - name: int_price_bars_adjusted
    description: Unified security bar records with per-date adjustment factors.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "trade_date", "freq"]
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('int_security_master')
              field: ts_code
      - name: trade_date
        tests:
          - not_null
      - name: freq
        tests:
          - not_null
          - accepted_values:
              values: ["daily", "weekly", "monthly"]
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: int_financial_reports_latest
    description: Wide financial report versions joined across income, balance sheet, cash flow, and financial indicators.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "ann_date", "f_ann_date", "end_date", "report_type", "comp_type", "update_flag"]
      - at_most_one_true_per_group:
          group_by_columns: ["ts_code", "end_date", "report_type"]
          flag_column: is_latest
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('int_security_master')
              field: ts_code
      - name: end_date
        tests:
          - not_null
      - name: ann_date
        tests:
          - not_null
      - name: report_type
        tests:
          - not_null
      - name: update_flag
        tests:
          - not_null
      - name: is_latest
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: int_security_master
    description: Security attributes joined from stock basics, company metadata, and latest name change metadata.
    columns:
      - name: ts_code
        tests:
          - not_null
          - unique
      - name: symbol
        tests:
          - not_null
      - name: name
        tests:
          - not_null
      - name: market
        tests:
          - not_null
      - name: list_date
        tests:
          - not_null
      - name: is_active
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: int_index_membership
    description: Normalized index constituent membership intervals with dated weight records.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["index_code", "con_code", "effective_date"]
    columns:
      - name: index_code
        tests:
          - not_null
          - relationships:
              to: ref('stg_index_basic')
              field: ts_code
              config:
                severity: error
      - name: con_code
        tests:
          - not_null
          - relationships:
              to: ref('int_security_master')
              field: ts_code
      - name: effective_date
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: int_market_daily_features
    description: Security daily market features joined from daily_basic, stk_limit, and moneyflow.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "trade_date"]
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('int_security_master')
              field: ts_code
      - name: trade_date
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: int_index_price_bars
    description: Index OHLCV records enriched with one normalized trade calendar record for the same trading date.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["index_code", "trade_date"]
    columns:
      - name: index_code
        tests:
          - not_null
          - relationships:
              to: ref('stg_index_basic')
              field: ts_code
              config:
                severity: error
      - name: trade_date
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: int_forecast_events
    description: Earnings forecast notifications normalized without collapsing Tushare forecast versions.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["ts_code", "ann_date", "end_date", "update_flag", "forecast_type"]
    columns:
      - name: ts_code
        tests:
          - not_null
          - relationships:
              to: ref('int_security_master')
              field: ts_code
      - name: ann_date
        tests:
          - not_null
      - name: end_date
        tests:
          - not_null
      - name: forecast_type
        tests:
          - not_null
      - name: update_flag
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null

  - name: int_event_timeline
    description: |-
      Event metadata timeline for announcements, suspensions, dividends, float
      changes, holders, disclosure dates, name changes, block trades, and (as
      of M1.13) the 8 candidate event_timeline sources promoted in the
      precondition 9 closure round (pledge_stat, pledge_detail, repurchase,
      stk_holdertrade, stk_surv, limit_list_ths, limit_list_d, hm_detail).
      Each row carries `source_interface_id` (per-branch constant) so
      canonical_lineage.lineage_fact_event can attribute lineage per-source
      rather than via a composite string. M1.6 added event_type='name_change';
      M1.8 adds event_type='block_trade'. The uniqueness contract here was
      intentionally widened in M1.8 to include `source_interface_id` and
      `summary` so intra-day multi-row event sources (block_trade) can flow
      through. This weakens the intermediate duplicate guard: the narrower
      M1.6 key `(event_type, ts_code, event_date, title, related_date,
      reference_url)` would have caught some duplicates that the new key
      lets through. Canonical row identity is therefore enforced downstream
      by the mart-level `event_key` md5, the v2/lineage canonical-PK parity
      tests in `mart_fact_event_v2` / `mart_lineage_fact_event`, and the
      writer-side canonical-PK validation in `canonical_writer`. M1.13
      promoted the 8 remaining candidate sources, taking event_timeline
      coverage to 16 source interfaces (full coverage). See
      `event-timeline-m1-11-candidate-schema-checkin-20260429.md` for the
      M1.11 sign-off table and
      `event-timeline-m1-13-candidate-promotion-proof-20260429.md` for the
      M1.13 promotion proof.
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ["event_type", "source_interface_id", "ts_code", "event_date", "title", "related_date", "reference_url", "summary"]
    columns:
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values:
                - "announcement"
                - "suspend"
                - "dividend"
                - "share_float"
                - "holder_number"
                - "disclosure_date"
                - "name_change"
                - "block_trade"
                # M1.13 expansion (precondition 9 closure).
                - "pledge_summary"
                - "pledge_event"
                - "share_repurchase"
                - "shareholder_trade"
                - "institutional_survey"
                - "price_limit_status"
                - "price_limit_event"
                - "hot_money_trade"
      - name: source_interface_id
        tests:
          - not_null
          - accepted_values:
              values:
                - "anns"
                - "suspend_d"
                - "dividend"
                - "share_float"
                - "stk_holdernumber"
                - "disclosure_date"
                - "namechange"
                - "block_trade"
                # M1.13 expansion (precondition 9 closure).
                - "pledge_stat"
                - "pledge_detail"
                - "repurchase"
                - "stk_holdertrade"
                - "stk_surv"
                - "limit_list_ths"
                - "limit_list_d"
                - "hm_detail"
      - name: ts_code
        tests:
          - relationships:
              to: ref('int_security_master')
              field: ts_code
      - name: event_date
        tests:
          - not_null
      - name: source_run_id
        tests:
          - not_null
      - name: raw_loaded_at
        tests:
          - not_null
